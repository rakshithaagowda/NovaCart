<!DOCTYPE html>
<html>
<head>
    <title>Mini Store</title>
</head>
<body>

<h1>Products</h1>

{% for product in products %}

<div style="border:1px solid #ddd;padding:15px;margin:15px;">

    <h3>{{ product.name }}</h3>

    <p>₹{{ product.price }}</p>

    <a href="{% url 'product_detail' product.slug %}">
        View Product
    </a>

</div>

{% empty %}

<p>No products found.</p>

{% endfor %}

</body>
</html>
