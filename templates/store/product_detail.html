<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>
</head>
<body>

<h1>{{ product.name }}</h1>

<p><strong>Price:</strong> ₹{{ product.price }}</p>

<p>{{ product.description }}</p>

<form action="{% url 'cart_add' product.id %}" method="post">
    {% csrf_token %}

    <input
        type="number"
        name="quantity"
        value="1"
        min="1"
        style="width:60px;"
    >

    <button type="submit">
        Add to Cart
    </button>
</form>

<br>

<a href="{% url 'product_list' %}">
    ← Back to Products
</a>

</body>
</html>
