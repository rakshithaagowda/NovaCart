{% extends "base.html" %}

{% block title %}
{{ product.name }}
{% endblock %}

{% block content %}

<div class="container">

    <div class="row">

        <div class="col-md-6">

            {% if product.image %}
                <img src="{{ product.image.url }}"
                     class="img-fluid rounded shadow">
            {% endif %}

        </div>

        <div class="col-md-6">

            <h2>{{ product.name }}</h2>

            <h3 class="text-primary">
                ₹{{ product.price }}
            </h3>

            <p>{{ product.description }}</p>

            <form action="{% url 'cart_add' product.id %}" method="post">

                {% csrf_token %}

                <input type="number"
                       name="quantity"
                       value="1"
                       min="1"
                       class="form-control w-25 mb-3">

                <button class="btn btn-success">
                    Add to Cart
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
