<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
</head>
<body>

<h1>Checkout</h1>

<p><strong>Order Total:</strong> ₹{{ cart.get_total_price }}</p>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Place Order
    </button>

</form>

<br>

<a href="{% url 'cart_detail' %}">
← Back to Cart
</a>

</body>
</html>
